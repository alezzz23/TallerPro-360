name: PostgreSQL Backup

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: postgres-backup
  cancel-in-progress: false

jobs:
  backup:
    name: Run pg_dump backup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client

      - name: Execute backup script
        id: backup
        env:
          DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
          BACKUP_OUTPUT_DIR: ${{ github.workspace }}/infra/backups
        run: |
          backup_path="$(infra/scripts/pg_backup.sh)"
          echo "backup_path=$backup_path" >> "$GITHUB_OUTPUT"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: postgres-backup-${{ github.run_id }}
          path: ${{ steps.backup.outputs.backup_path }}
          if-no-files-found: error
          retention-days: 14