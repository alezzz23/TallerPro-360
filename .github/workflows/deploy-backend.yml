name: Backend Checks on Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: backend-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-checks:
    name: Backend checks before Railway auto-deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync backend dependencies
        run: uv sync --locked --dev

      - name: Run Ruff
        run: uv run ruff check src tests

      - name: Run pytest
        run: uv run pytest