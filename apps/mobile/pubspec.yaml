name: tallerpro360_mobile
description: Scaffold inicial Flutter para TallerPro360.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.6.3

  # HTTP client
  dio: ^5.8.0+1

  # Secure storage (JWT)
  flutter_secure_storage: ^9.2.4

  # Local DB (offline-first)
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.0

  # Freezed annotation
  freezed_annotation: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.4.4
  drift_dev: ^2.23.1
  json_serializable: ^6.9.4
  freezed: ^2.5.8

flutter:
  uses-material-design: true
