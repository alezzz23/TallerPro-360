services:
  api:
    build:
      context: ../../services/api
      dockerfile: Dockerfile
    container_name: tallerpro360-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_NAME: TallerPro360 API
      APP_VERSION: 0.1.0
      ENVIRONMENT: development
      API_PREFIX: /api/v1
      DATABASE_URL: postgresql://tallerpro360:tallerpro360@postgres:5432/tallerpro360
      SECRET_KEY: tallerpro360-dev-secret-change-in-production
      MEDIA_DIR: /app/media
      MEDIA_URL_PATH: /media
      LOG_LEVEL: INFO
      LOG_JSON: "true"
      AUTO_CREATE_TABLES: "true"
      RUN_DB_MIGRATIONS: "false"
      ENABLE_PG_LISTENER: "true"
      PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - api_media:/app/media
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:17
    container_name: tallerpro360-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tallerpro360
      POSTGRES_USER: tallerpro360
      POSTGRES_PASSWORD: tallerpro360
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tallerpro360 -d tallerpro360"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  api_media:
  postgres_data:
